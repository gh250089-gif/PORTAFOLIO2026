<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inicio de Sesión</title>


<link rel="stylesheet" href="../css/style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>


<body>


<div class="contenedor">


<section class="informacion">


<img src="../img/Logo.png" class="logo">


<h2>
Instituto Nacional <br>
De Educación Básica
</h2>


<h3>
INEB
</h3>


<p>
Taxisco, Santa Rosa.
</p>


</section>





<section class="login">


<div class="card">


<h2>Iniciar Sesión</h2>



<form id="formLogin">



<label>
Usuario
</label>



<div class="input">

<input 
type="text"
id="usuario"
placeholder="Ingrese su usuario">

</div>





<label>
Contraseña
</label>



<div class="input">


<input
type="password"
id="password"
placeholder="Ingrese su contraseña">



<i id="togglePassword"
class="fa-solid fa-eye"></i>


</div>





<div class="opciones">


<label>

<input type="checkbox">

Recordarme

</label>



<a href="#">
¿Olvidaste tu contraseña?
</a>


</div>




<button type="submit">

Iniciar Sesión

</button>



</form>





<footer>

© 2026 Guillermo Hernandez

</footer>



</div>


</section>


</div>






<!-- LOADER LOGIN -->

<div id="loader" class="loader">


<div class="spinner"></div>


<p>
Iniciando sesión...
</p>


</div>





<script src="../js/login.js" defer></script>


</body>


</html>
